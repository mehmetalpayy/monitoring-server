groups:
  - name: vm-resource-alerts
    rules:
      - alert: VMHighCPU
        expr: |
          (
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          )
          * on (instance) group_left (nodename) node_uname_info
          > 70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU on {{ $labels.nodename }} ({{ $labels.instance }})"
          description: "CPU usage is {{ printf \"%.2f\" $value }}% (> 70%) on {{ $labels.nodename }} ({{ $labels.instance }})"

      - alert: VMHighCPUCritical
        expr: |
          (
            100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
          )
          * on (instance) group_left (nodename) node_uname_info
          > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical CPU on {{ $labels.nodename }} ({{ $labels.instance }})"
          description: "CPU usage is {{ printf \"%.2f\" $value }}% (> 90%) on {{ $labels.nodename }} ({{ $labels.instance }})"

      - alert: VMHighMemory
        expr: |
          (
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
          )
          * on (instance) group_left (nodename) node_uname_info
          > 70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.nodename }} ({{ $labels.instance }})"
          description: "Memory usage is {{ printf \"%.2f\" $value }}% (> 70%) on {{ $labels.nodename }} ({{ $labels.instance }})"

      - alert: VMHighMemoryCritical
        expr: |
          (
            (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100
          )
          * on (instance) group_left (nodename) node_uname_info
          > 90
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Critical memory usage on {{ $labels.nodename }} ({{ $labels.instance }})"
          description: "Memory usage is {{ printf \"%.2f\" $value }}% (> 90%) on {{ $labels.nodename }} ({{ $labels.instance }})"

      - alert: VMHighDisk
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|boot|snap|var/lib/docker/.+|var/lib/containerd/.+)"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|boot|snap|var/lib/docker/.+|var/lib/containerd/.+)"}
            )
          ) * 100
          * on (instance) group_left (nodename) node_uname_info
          > 70
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.nodename }} ({{ $labels.instance }})"
          description: "Disk usage is {{ printf \"%.2f\" $value }}% (> 70%) on {{ $labels.nodename }} ({{ $labels.instance }})"

      - alert: VMHighDiskCritical
        expr: |
          (
            1 - (
              node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|boot|snap|var/lib/docker/.+|var/lib/containerd/.+)"}
              / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs",mountpoint!~"^/(run|boot|snap|var/lib/docker/.+|var/lib/containerd/.+)"}
            )
          ) * 100
          * on (instance) group_left (nodename) node_uname_info
          > 90
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk usage on {{ $labels.nodename }} ({{ $labels.instance }})"
          description: "Disk usage is {{ printf \"%.2f\" $value }}% (> 90%) on {{ $labels.nodename }} ({{ $labels.instance }})"
