groups:
  - name: container-alerts
    rules:
      - alert: ContainerDown
        expr: |
          # Optional filter example:
          # time() - container_last_seen{container_label_com_docker_compose_service=~"api|web"} > 300
          time() - container_last_seen{name!~"^$|POD"} > 300
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Container down on {{ $labels.instance }}"
          description: "Container {{ $labels.name }} not seen for > 5m on {{ $labels.instance }}."
